apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin
  namespace: httpbin
spec:
  parentRefs:
  # Attach to the single shared gateway (see ../gateway/). Every service does this.
  - name: home-gateway
    namespace: istio-system
    kind: Gateway
  rules:
  - backendRefs:
    - name: httpbin
      port: 80
