apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: the web UI is exposed at ddns-updater.home.bkanuka.com and PROTECTED by
# Authentik forward-auth (authorizationpolicy.yaml), same as httpbin.
#
# The provider config (domains + Gandi token) is NOT in git — it lives on the
# server at /mnt/main/config/ddns-updater/config.json and is mounted via hostPath
# (see deployment.yaml). config.json.example documents its format.
resources:
- namespace.yaml
- deployment.yaml
- service.yaml
- httproute.yaml
# Authentik forward-auth enforcement (in istio-system, scoped to this host only).
- authorizationpolicy.yaml
