# Protect the qBittorrent Web UI with forward-auth (same shape as
# 10-app-httpbin.yaml). Provider registered with the outpost in 20-outpost.yaml.
version: 1
metadata:
  name: app — qbittorrent (forward-auth)
entries:
  - model: authentik_providers_proxy.proxyprovider
    id: provider-qbittorrent
    identifiers:
      name: qbittorrent
    attrs:
      mode: forward_single
      external_host: https://qbittorrent.home.bkanuka.com
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  - model: authentik_core.application
    id: app-qbittorrent
    identifiers:
      slug: qbittorrent
    attrs:
      name: qBittorrent
      provider: !KeyOf provider-qbittorrent
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-qbittorrent
      group: !Find [authentik_core.group, [name, home-app-access]]
      order: 0
    attrs:
      enabled: true
