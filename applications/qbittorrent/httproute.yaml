# qBittorrent Web UI at qbittorrent.home.bkanuka.com over HTTPS, PROTECTED by
# Authentik forward-auth (see authorizationpolicy.yaml + ../../istio meshConfig),
# same pattern as httpbin. Rule 1 carves the outpost sign-in paths to Authentik
# (cross-namespace via the ReferenceGrant in applications/authentik/httproute.yaml);
# rule 2 sends everything else to qBittorrent (:8888).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent
  namespace: qbittorrent
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    name: home-gateway
    namespace: istio-system
    kind: Gateway
    sectionName: https
  hostnames:
  - qbittorrent.home.bkanuka.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /outpost.goauthentik.io
    backendRefs:
    - name: authentik-server
      namespace: authentik
      port: 9000
      weight: 1
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: qbittorrent
      port: 8888
      weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent-https-redirect
  namespace: qbittorrent
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    name: home-gateway
    namespace: istio-system
    kind: Gateway
    sectionName: http
  hostnames:
  - qbittorrent.home.bkanuka.com
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
