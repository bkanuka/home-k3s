# ddns-updater web UI at ddns-updater.home.bkanuka.com over HTTPS (uniform
# host-based routing), plus an HTTP->HTTPS redirect. ROOT_URL is already "/" and
# the service listens on 8572. NOTE: this UI is UNAUTHENTICATED (like the other
# non-httpbin services) — it's reachable by anyone who can hit the gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ddns-updater
  namespace: ddns-updater
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    name: home-gateway
    namespace: istio-system
    kind: Gateway
    sectionName: https
  hostnames:
  - ddns-updater.home.bkanuka.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: ddns-updater
      port: 8572
      weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ddns-updater-https-redirect
  namespace: ddns-updater
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    name: home-gateway
    namespace: istio-system
    kind: Gateway
    sectionName: http
  hostnames:
  - ddns-updater.home.bkanuka.com
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
