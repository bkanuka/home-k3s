apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: the web UI is now exposed at ddns-updater.home.bkanuka.com (uniform
# host-based routing) but is UNAUTHENTICATED — anyone who can reach the gateway
# can view it. Consider putting it behind Authentik forward-auth (as httpbin is)
# if that matters.
#
# The provider config (domains + Gandi token) is NOT in git — it lives on the
# server at /mnt/main/config/ddns-updater/config.json and is mounted via hostPath
# (see deployment.yaml). config.json.example documents its format.
resources:
- namespace.yaml
- deployment.yaml
- service.yaml
- httproute.yaml
