# Brand customization for the default brand. Hide the login/flow background photo
# via custom CSS. (The branding_default_flow_background field is a file-NAME field
# — it rejects data URIs and the importer skips empty strings — so we can't clear
# it directly.) As of authentik 2026.5 the background is painted by the `body::before`
# pseudo-element from `background-image: var(--ak-global--background-image, none)`,
# with the URL set as an inline custom property on <body>. Overriding the
# pseudo-element rule wins because inline styles can't target ::before.
version: 1
metadata:
  name: home brand customization
entries:
  - model: authentik_brands.brand
    identifiers:
      domain: authentik-default
    attrs:
      branding_custom_css: |
        body::before { background-image: none !important; }
