# ddns-updater web UI at ddns-updater.home.bkanuka.com over HTTPS, PROTECTED by
# Authentik forward-auth (see authorizationpolicy.yaml + ../../istio meshConfig),
# same pattern as httpbin. ROOT_URL is "/" and the service listens on 8572.
#
# Two rules (most-specific first):
#   1. /outpost.goauthentik.io/*  -> Authentik embedded outpost (sign-in endpoints
#      must live on THIS host; cross-namespace via the ReferenceGrant in
#      applications/authentik/httproute.yaml).
#   2. /                          -> ddns-updater (gated by ext_authz).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ddns-updater
  namespace: ddns-updater
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    name: home-gateway
    namespace: istio-system
    kind: Gateway
    sectionName: https
  hostnames:
  - ddns-updater.home.bkanuka.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /outpost.goauthentik.io
    backendRefs:
    - name: authentik-server
      namespace: authentik
      port: 9000
      weight: 1
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: ddns-updater
      port: 8572
      weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ddns-updater-https-redirect
  namespace: ddns-updater
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    name: home-gateway
    namespace: istio-system
    kind: Gateway
    sectionName: http
  hostnames:
  - ddns-updater.home.bkanuka.com
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
