apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# cert-manager — core platform (bootstrapped by install.sh, NOT Argo CD).
# Issues Let's Encrypt TLS certs for the shared gateway's HTTPS listeners.
#
# Installed via Helm inflated by kustomize (same mechanism as istio/), so it
# needs `kustomize build --enable-helm`. The ClusterIssuer is intentionally NOT
# built here — it is a cert-manager CRD that its validating webhook rejects until
# the webhook pod is ready, so install.sh applies clusterissuer.yaml separately
# (with a retry), mirroring how metallb/config.yaml is applied.
resources:
- namespace.yaml

helmCharts:
- name: cert-manager
  repo: https://charts.jetstack.io
  version: v1.21.0
  releaseName: cert-manager
  namespace: cert-manager
  includeCRDs: true
  valuesInline:
    crds:
      enabled: true
    # Enable the Gateway API integration so cert-manager reconciles certs for
    # Gateway listeners annotated with cert-manager.io/cluster-issuer (the
    # gateway-shim controller). On v1.21.0 this needs BOTH controller switches —
    # the feature gate alone is necessary but NOT sufficient:
    #   1. ExperimentalGatewayAPISupport feature gate (BETA, default=true; kept
    #      explicit for clarity/pinning).
    #   2. the --enable-gateway-api flag, which defaults OFF. Without it,
    #      gateway-shim logs "skipping disabled controller" and no Certificate is
    #      ever created for the annotated Gateway.
    # The config-file forms the chart's values.yaml documents both FAIL here:
    # `config.gatewayAPI.enable` strict-decode crash-loops (unknown field), and
    # `config.featureGates` is silently ignored. Set them as controller flags.
    featureGates: "ExperimentalGatewayAPISupport=true"
    extraArgs:
    - --enable-gateway-api
