apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin
  namespace: httpbin
spec:
  parentRefs:
  # Attach to the single shared gateway (see ../gateway/). Every service does this.
  - name: home-gateway
    namespace: istio-system
    kind: Gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /httpbin
    # httpbin serves its endpoints at root (/get, /headers, ...), so strip the
    # /httpbin prefix before forwarding: /httpbin/get -> /get, /httpbin -> /.
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: httpbin
      port: 80
