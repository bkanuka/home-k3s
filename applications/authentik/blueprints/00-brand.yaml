# Brand customization for the default brand. Hide the login/flow background photo
# via custom CSS. (The branding_default_flow_background field is a file-NAME field
# — it rejects data URIs and the importer skips empty strings — so we can't clear
# it directly; instead we override PatternFly's background element to no image.)
version: 1
metadata:
  name: home brand customization
entries:
  - model: authentik_brands.brand
    identifiers:
      domain: authentik-default
    attrs:
      branding_custom_css: |
        .pf-c-background-image { background-image: none !important; }
