apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Set on all resources so the generated ConfigMap lands in `authentik` too —
# otherwise its namespace wouldn't match the Deployments and kustomize wouldn't
# rewrite the hashed name into their volume refs.
namespace: authentik

# Authentik (plain manifests — no Helm, so Argo CD needs no --enable-helm).
# Identity provider brokering Google logins; protects httpbin via ext_authz
# forward-auth (see ../../istio meshConfig + ../httpbin/authorizationpolicy.yaml).
#
# The `authentik-secrets` Secret is NOT built here — install.sh materializes it
# from /mnt/main/config/authentik/authentik.env (see secret.env.example), so no
# secret lands in git. Until it exists, the server/worker pods won't start.
resources:
- namespace.yaml
- postgres.yaml
- redis.yaml
- server.yaml
- worker.yaml
- httproute.yaml

# Turn each file under blueprints/ into a key in the authentik-blueprints
# ConfigMap; Authentik treats each as a separate blueprint. configMapGenerator
# embeds files verbatim, so the !Env/!Find/!KeyOf tags survive. The name-suffix
# hash means any blueprint edit produces a new ConfigMap name, which kustomize
# rewrites into the server/worker volume refs — so Argo rolls both pods and the
# worker re-applies. Add a protected app by dropping a blueprints/NN-app-*.yaml
# here and adding its provider to blueprints/20-outpost.yaml.
configMapGenerator:
- name: authentik-blueprints
  files:
  - blueprints/00-identity.yaml
  - blueprints/10-app-httpbin.yaml
  - blueprints/10-app-ddns-updater.yaml
  - blueprints/20-outpost.yaml
