apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml

# Ingress-only Istio: just the control plane + Gateway API support. No mesh data
# plane (no sidecars, no ambient ztunnel, no istio-cni). The Gateway is a plain
# Envoy pod that istiod manages; it does not need the mesh to route traffic.
#
# To add mTLS/mesh later, re-introduce the cni + ztunnel charts (ambient) or
# enable sidecar injection. Gateway-level auth (ext_authz / JWT) does NOT require
# any of that — it is enforced on the gateway proxy regardless.
helmCharts:
# 1. Base: CRDs and cluster-scoped resources
- name: base
  repo: https://istio-release.storage.googleapis.com/charts
  version: 1.29.2
  releaseName: istio-base
  namespace: istio-system
  includeCRDs: true

# 2. Istiod: control plane. Default profile; Gateway API support is on by default
#    in Istio 1.29, so `Gateway`/`HTTPRoute` resources are reconciled out of the box.
- name: istiod
  repo: https://istio-release.storage.googleapis.com/charts
  version: 1.29.2
  releaseName: istiod
  namespace: istio-system
