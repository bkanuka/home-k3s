# Protect httpbin with forward-auth: proxy provider + application + access
# binding. To protect another service, copy this file and change the name/slug/
# external_host, then add its provider to 20-outpost.yaml.
#
# The group is defined in 00-identity.yaml, so it's referenced by !Find (not
# !KeyOf, which is file-local); the provider/app are in this file, so !KeyOf.
version: 1
metadata:
  name: app — httpbin (forward-auth)
entries:
  - model: authentik_providers_proxy.proxyprovider
    id: provider-httpbin
    identifiers:
      name: httpbin
    attrs:
      mode: forward_single
      external_host: https://httpbin.home.bkanuka.com
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  - model: authentik_core.application
    id: app-httpbin
    identifiers:
      slug: httpbin
    attrs:
      name: httpbin
      provider: !KeyOf provider-httpbin
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-httpbin
      group: !Find [authentik_core.group, [name, home-app-access]]
      order: 0
    attrs:
      enabled: true
