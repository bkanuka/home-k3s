apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: no HTTPRoute — ddns-updater's web UI has no authentication, so it is not
# exposed through the internet-facing gateway. Reach it via
# `kubectl -n ddns-updater port-forward svc/ddns-updater 8572:8572` if needed.
#
# The provider config (domains + Gandi token) is NOT in git — it lives on the
# server at /mnt/main/config/ddns-updater/config.json and is mounted via hostPath
# (see deployment.yaml). config.json.example documents its format.
resources:
- namespace.yaml
- deployment.yaml
- service.yaml
