apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Serve plain HTTP (no self-signed TLS): the Istio gateway fronts Argo CD on
  # its HTTP :80 listener and talks to argocd-server's http port.
  server.insecure: "true"
  # Serve the UI/API under the /argocd subpath so it can share the single shared
  # gateway with other services. The HTTPRoute forwards /argocd unmodified;
  # argocd-server handles the prefix itself (no URL rewrite needed).
  server.rootpath: "/argocd"
  server.basehref: "/argocd"
