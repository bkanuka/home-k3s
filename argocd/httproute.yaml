# Argo CD UI/API at argocd.home.bkanuka.com over HTTPS (uniform host-based
# routing, like every other app), plus an HTTP->HTTPS redirect. Argo CD now runs
# at the host ROOT (no /argocd subpath), so the server.rootpath/basehref settings
# were dropped from cmd-params-patch.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    name: home-gateway
    namespace: istio-system
    kind: Gateway
    sectionName: https
  hostnames:
  - argocd.home.bkanuka.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    # argocd-server's http port (plain HTTP because server.insecure=true).
    - group: ''
      kind: Service
      name: argocd-server
      port: 80
      weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-https-redirect
  namespace: argocd
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    name: home-gateway
    namespace: istio-system
    kind: Gateway
    sectionName: http
  hostnames:
  - argocd.home.bkanuka.com
  rules:
  # Explicit match (PathPrefix /) even though it's redirect-only: the argocd app
  # syncs with ServerSideApply, so it compares against the live object including
  # the `matches` default Istio injects — omitting it here causes perpetual
  # OutOfSync. (The ApplicationSet apps use client-side apply and don't need this.)
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
