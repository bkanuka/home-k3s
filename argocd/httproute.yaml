apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
  # Attach to the single shared gateway, same as every other service.
  - group: gateway.networking.k8s.io
    name: home-gateway
    namespace: istio-system
    kind: Gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /argocd
    backendRefs:
    # argocd-server's http port (plain HTTP because server.insecure=true).
    - group: ''
      kind: Service
      name: argocd-server
      port: 80
      weight: 1
