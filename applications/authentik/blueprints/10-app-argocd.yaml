# Argo CD SSO via OIDC (NOT forward-auth): Argo CD is OIDC-native, so it talks to
# this Authentik OAuth2/OpenID provider directly. Public client + PKCE means no
# client secret to share — nothing secret lands in git (the client_id is public).
#
# Argo CD side lives in ../../argocd/cm-patch.yaml (oidc.config) and
# rbac-patch.yaml (home-admins -> role:admin). Argo CD reads groups from the
# `profile` scope (Authentik's default profile mapping includes group names).
version: 1
metadata:
  name: app — Argo CD (OIDC SSO)
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-argocd
    identifiers:
      name: argocd
    attrs:
      client_type: public
      client_id: argocd
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      # ID tokens must be signed; use Authentik's default self-signed keypair.
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: https://argocd.home.bkanuka.com/auth/callback
        # argocd CLI `argocd login --sso` uses a localhost callback.
        - matching_mode: strict
          url: http://localhost:8085/auth/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      sub_mode: hashed_user_id
  - model: authentik_core.application
    id: app-argocd
    identifiers:
      slug: argocd
    attrs:
      name: Argo CD
      provider: !KeyOf provider-argocd
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-argocd
      group: !Find [authentik_core.group, [name, home-app-access]]
      order: 0
    attrs:
      enabled: true
