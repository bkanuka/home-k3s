apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  # Argo CD manages itself: this Application points at this very directory, so
  # edits to the install version, cmd-params, HTTPRoute, or ApplicationSet are
  # reconciled from git after the initial bootstrap.
  source:
    repoURL: https://github.com/bkanuka/home-k3s.git
    targetRevision: main
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    # NOTE: ServerSideApply is applied PER-RESOURCE (only to the CRDs, which are
    # too large for client-side apply's last-applied annotation) via a sync-option
    # annotation in kustomization.yaml — NOT app-wide. App-wide SSA makes the
    # HTTPRoute perpetually OutOfSync due to Istio's controller field ownership.
