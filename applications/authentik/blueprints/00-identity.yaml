# Login identity source: the Google OAuth source and its "Login with Google"
# button on the default login page. Users and groups live in 00-users-groups.yaml.
version: 1
metadata:
  name: home identity — Google source
entries:
  # --- Google OAuth source ("Login with Google") ---
  - model: authentik_sources_oauth.oauthsource
    id: source-google
    identifiers:
      slug: google
    attrs:
      name: Google
      provider_type: google
      consumer_key: !Env GOOGLE_CLIENT_ID
      consumer_secret: !Env GOOGLE_CLIENT_SECRET
      enabled: true
      # Link Google logins to EXISTING users by verified email. With no
      # enrollment flow set, any Google account without a pre-created match is
      # rejected — that plus the single user below locks it to one person.
      user_matching_mode: email_link
      authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]

  # Attach the Google source to the login page's identification stage so the
  # "Login with Google" button appears (the source existing isn't enough).
  - model: authentik_stages_identification.identificationstage
    identifiers:
      name: default-authentication-identification
    attrs:
      sources:
        - !KeyOf source-google
